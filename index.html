<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Cleanly intercept and silence the HMR and socket connection chatter
      const _debug = console.debug;
      console.debug = function (...args) {
        if (args[0] && typeof args[0] === 'string' && (args[0].includes('[vite]') || args[0].toLowerCase().includes('connect'))) {
          return;
        }
        _debug.apply(console, args);
      };

      const _log = console.log;
      console.log = function (...args) {
        if (args[0] && typeof args[0] === 'string' && (args[0] === 'CONNECTED' || args[0].toLowerCase().includes('connect') || args[0].includes('[vite]'))) {
          return;
        }
        _log.apply(console, args);
      };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./src/main.tsx"></script>
  </body>
</html>
